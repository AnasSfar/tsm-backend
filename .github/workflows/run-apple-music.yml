name: Run Apple Music

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"  # 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC

concurrency:
  group: run-apple-music
  cancel-in-progress: false

jobs:
  run-apple-music:
    runs-on: ubuntu-latest
    environment: .env
    permissions:
      contents: write
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get Playwright version
        run: echo "PLAYWRIGHT_VERSION=$(pip show playwright | grep Version | cut -d' ' -f2)" >> $GITHUB_ENV

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Download Apple Music CSV history from R2
        run: |
          python - <<'EOF'
          import boto3, os, csv
          from pathlib import Path
          client = boto3.client(
              "s3",
              endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              region_name="auto",
          )
          bucket = os.environ.get("R2_BUCKET", "taylor-data")
          dest_dir = Path("data/_archive/original/db")
          dest_dir.mkdir(parents=True, exist_ok=True)
          csv_names = [
              "apple_music_global.csv",
              "apple_music_country_charts.csv",
              "apple_music_genre_charts.csv",
              "apple_music_ts_top_songs.csv",
              "apple_music_country_albums.csv",
              "apple_music_genre_album_charts.csv",
              "apple_music_music_video_charts.csv",
          ]
          for name in csv_names:
              key = f"apple-music/db/{name}"
              dest = dest_dir / name
              try:
                  client.download_file(bucket, key, str(dest))
                  with open(dest, newline="", encoding="utf-8-sig") as f:
                      count = sum(1 for _ in csv.DictReader(f))
                  print(f"Downloaded {key} — {count} row(s)")
              except Exception as e:
                  print(f"Not found: {key} (first run?)")
          EOF

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run Apple Music
        run: python collectors/apple_music/run_apple_music.py

      - name: Upload Apple Music data to R2
        run: python scripts/upload_ap_r2.py

      - name: Commit and push Apple Music data
        run: |
          git add website/site/data/applemusic.json
          git diff --staged --quiet || git commit -m "chore: update Apple Music data [skip ci]"
          git push
