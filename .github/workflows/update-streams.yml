name: Update Spotify Streams

on:
  workflow_dispatch:
  schedule:
    - cron: '15 7 * * *'  # Tous les jours à 07:15 UTC

jobs:
  update-streams:
    runs-on: ubuntu-latest
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      # Ajoute d'autres secrets si besoin
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run update_streams.py
        run: |
          python collectors/spotify/streams/update_streams.py --no-post

      - name: Export for web
        run: |
          python scripts/export_for_web.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(data): update Spotify streams [bot]'
          branch: main
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
          push_options: '--force-with-lease'
