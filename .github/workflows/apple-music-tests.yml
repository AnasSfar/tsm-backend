name: Apple Music Tests

on:
  push:
    paths:
      - "collectors/apple_music/**"
      - ".github/workflows/apple-music-tests.yml"
  pull_request:
    paths:
      - "collectors/apple_music/**"
      - ".github/workflows/apple-music-tests.yml"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Run Apple Music unit tests
        run: python -m unittest discover -s collectors/apple_music/tests -p "test_*.py"
